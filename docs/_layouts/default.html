<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --bg-card: #111111;
      --border: #1f1f1f;
      --text: #d4d4d4;
      --muted: #555;
      --accent: #22c55e;
      --sidebar-w: 256px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-w);
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 24px 20px 18px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #sidebar-header .brand {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #sidebar-header .sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
    }

    #sidebar-nav {
      overflow-y: auto;
      flex: 1;
      padding: 12px 0 24px;
      list-style: none;
    }

    #sidebar-nav::-webkit-scrollbar { width: 4px; }
    #sidebar-nav::-webkit-scrollbar-track { background: transparent; }
    #sidebar-nav::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

    #sidebar-nav li a {
      display: block;
      padding: 5px 20px;
      font-size: 12px;
      color: #4a4a4a;
      text-decoration: none;
      line-height: 1.45;
      transition: color 0.12s, background 0.12s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #sidebar-nav li a.h2 {
      font-weight: 600;
      color: #666;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    #sidebar-nav li:first-child a.h2 {
      margin-top: 0;
      border-top: none;
    }

    #sidebar-nav li a.h3 {
      padding-left: 32px;
      font-size: 11px;
    }

    #sidebar-nav li a:hover { color: #aaa; }

    #sidebar-nav li a.active {
      color: var(--accent);
      background: rgba(34, 197, 94, 0.07);
    }

    /* ── Main content ── */
    #main {
      margin-left: var(--sidebar-w);
      flex: 1;
      max-width: 820px;
      padding: 52px 52px 96px;
      min-width: 0;
    }

    /* Typography */
    #main h1 {
      font-size: 24px;
      font-weight: 700;
      color: #f0f0f0;
      line-height: 1.3;
      margin-bottom: 6px;
    }

    #main > p:first-of-type {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 32px;
    }

    #main h2 {
      font-size: 17px;
      font-weight: 600;
      color: #e8e8e8;
      margin: 48px 0 18px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    #main h3 {
      font-size: 14px;
      font-weight: 600;
      color: #c0c0c0;
      margin: 32px 0 10px;
    }

    #main h4 {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 20px 0 8px;
    }

    #main p {
      font-size: 13.5px;
      line-height: 1.75;
      color: #aaa;
      margin-bottom: 12px;
    }

    #main ul, #main ol {
      padding-left: 20px;
      margin-bottom: 14px;
    }

    #main li {
      font-size: 13px;
      line-height: 1.7;
      color: #999;
      margin-bottom: 5px;
    }

    #main li strong { color: #d0d0d0; }

    #main strong { color: #d8d8d8; font-weight: 600; }

    #main em { color: #666; font-style: italic; }

    #main a { color: var(--accent); text-decoration: none; }
    #main a:hover { text-decoration: underline; }

    #main hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 36px 0;
    }

    #main table {
      width: 100%;
      border-collapse: collapse;
      margin: 18px 0;
      font-size: 12px;
    }

    #main thead tr {
      border-bottom: 1px solid var(--border);
    }

    #main th {
      text-align: left;
      padding: 8px 14px;
      color: #555;
      font-weight: 500;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    #main td {
      padding: 8px 14px;
      color: #888;
      border-bottom: 1px solid #141414;
    }

    #main tbody tr:hover td { background: #111; }

    #main td strong { color: #c0c0c0; }

    #main code {
      font-family: 'SF Mono', 'Fira Code', 'Monaco', monospace;
      font-size: 11.5px;
      background: #181818;
      padding: 2px 6px;
      border-radius: 3px;
      color: #7dd3a8;
    }

    /* Responsive */
    @media (max-width: 860px) {
      #sidebar { display: none; }
      #main { margin-left: 0; padding: 28px 24px 64px; }
    }
  </style>
</head>
<body>

<nav id="sidebar">
  <div id="sidebar-header">
    <div class="brand">Kalpi</div>
    <div class="sub">Research &amp; Product Thinking</div>
  </div>
  <ul id="sidebar-nav"></ul>
</nav>

<main id="main">
  {{ content }}
</main>

<script>
  const nav = document.getElementById('sidebar-nav');
  const headings = Array.from(document.querySelectorAll('#main h2, #main h3'));

  headings.forEach(h => {
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.href = '#' + h.id;
    // strip leading "1. " numbering from display text
    a.textContent = h.textContent.replace(/^\d+\.\s+/, '');
    a.className = h.tagName === 'H2' ? 'h2' : 'h3';
    li.appendChild(a);
    nav.appendChild(li);
  });

  // Highlight active section on scroll
  const links = Array.from(nav.querySelectorAll('a'));

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        links.forEach(l => l.classList.remove('active'));
        const active = nav.querySelector('a[href="#' + entry.target.id + '"]');
        if (active) {
          active.classList.add('active');
          // scroll sidebar to keep active link visible
          active.scrollIntoView({ block: 'nearest' });
        }
      }
    });
  }, { rootMargin: '-10% 0px -80% 0px', threshold: 0 });

  headings.forEach(h => observer.observe(h));
</script>

</body>
</html>
