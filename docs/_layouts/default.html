<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-card: #f9f9f9;
      --border: #e5e5e5;
      --text: #1a1a1a;
      --muted: #888;
      --accent: #c0392b;
      --sidebar-w: 256px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-w);
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 24px 20px 18px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #sidebar-header .brand {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #sidebar-header .sub {
      font-size: 11px;
      color: #aaa;
      margin-top: 3px;
    }

    #sidebar-nav {
      overflow-y: auto;
      flex: 1;
      padding: 12px 0 24px;
      list-style: none;
    }

    #sidebar-nav::-webkit-scrollbar { width: 4px; }
    #sidebar-nav::-webkit-scrollbar-track { background: transparent; }
    #sidebar-nav::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

    #sidebar-nav li a {
      display: block;
      padding: 5px 20px;
      font-size: 12px;
      color: #888;
      text-decoration: none;
      line-height: 1.45;
      transition: color 0.12s, background 0.12s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #sidebar-nav li a.h2 {
      font-weight: 600;
      color: #444;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    #sidebar-nav li:first-child a.h2 {
      margin-top: 0;
      border-top: none;
    }

    #sidebar-nav li a.h3 {
      padding-left: 32px;
      font-size: 11px;
    }

    #sidebar-nav li a:hover { color: #1a1a1a; }

    #sidebar-nav li a.active {
      color: var(--accent);
      background: rgba(192, 57, 43, 0.07);
    }

    /* ── Main content ── */
    #main {
      margin-left: var(--sidebar-w);
      flex: 1;
      max-width: 820px;
      padding: 52px 52px 96px;
      min-width: 0;
    }

    /* Typography */
    #main h1 {
      font-size: 24px;
      font-weight: 700;
      color: #111;
      line-height: 1.3;
      margin-bottom: 6px;
    }

    #main > p:first-of-type {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 32px;
    }

    #main h2 {
      font-size: 17px;
      font-weight: 600;
      color: #111;
      margin: 48px 0 18px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    #main h3 {
      font-size: 14px;
      font-weight: 600;
      color: #222;
      margin: 32px 0 10px;
    }

    #main h4 {
      font-size: 12px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 20px 0 8px;
    }

    #main p {
      font-size: 13.5px;
      line-height: 1.75;
      color: #333;
      margin-bottom: 12px;
    }

    #main ul, #main ol {
      padding-left: 20px;
      margin-bottom: 14px;
    }

    #main li {
      font-size: 13px;
      line-height: 1.7;
      color: #444;
      margin-bottom: 5px;
    }

    #main li strong { color: #111; }

    #main strong { color: #111; font-weight: 600; }

    #main em { color: #666; font-style: italic; }

    #main a { color: var(--accent); text-decoration: none; }
    #main a:hover { text-decoration: underline; }

    #main hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 36px 0;
    }

    #main table {
      width: 100%;
      border-collapse: collapse;
      margin: 18px 0;
      font-size: 12px;
    }

    #main thead tr {
      border-bottom: 1px solid var(--border);
    }

    #main th {
      text-align: left;
      padding: 8px 14px;
      color: #888;
      font-weight: 500;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    #main td {
      padding: 8px 14px;
      color: #444;
      border-bottom: 1px solid #eee;
    }

    #main tbody tr:hover td { background: #fafafa; }

    #main td strong { color: #111; }

    #main code {
      font-family: 'SF Mono', 'Fira Code', 'Monaco', monospace;
      font-size: 11.5px;
      background: #f4f4f4;
      padding: 2px 6px;
      border-radius: 3px;
      color: #c0392b;
    }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      font-size: 9.5px;
      font-weight: 700;
      padding: 1px 7px;
      border-radius: 3px;
      vertical-align: middle;
      margin: 0 4px 0 2px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      line-height: 18px;
      white-space: nowrap;
    }
    .badge.reg    { background: #fff7ed; color: #c2410c; border: 1px solid #fcd8b0; }
    .badge.assume { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
    .badge.impl   { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }

    /* Legend */
    #badge-legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 28px;
      padding: 12px 16px;
      background: #fafafa;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      font-size: 11px;
      color: #666;
    }
    #badge-legend span { display: flex; align-items: center; gap: 6px; }

    /* ── Comparison matrix ── */
    .comp-matrix { margin: 20px 0 12px; }
    .comp-filters {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: flex-start;
      padding: 12px 0;
      margin-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .filter-group { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .fg-label {
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #bbb;
      min-width: 38px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border: 1px solid #ddd;
      border-radius: 20px;
      font-size: 11px;
      cursor: pointer;
      color: #999;
      background: white;
      user-select: none;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    .chip input[type=checkbox] { display: none; }
    .chip.active { background: #111; color: white; border-color: #111; }
    .comp-table-scroll { overflow-x: auto; }
    .comp-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      min-width: 560px;
    }
    .comp-table thead th {
      background: #f9f9f9;
      padding: 8px 12px;
      text-align: left;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
    }
    .comp-table tbody td {
      padding: 9px 12px;
      border-bottom: 1px solid #f5f5f5;
      vertical-align: middle;
    }
    .comp-table tbody tr:hover td { background: #fafafa; }
    .kalpi-row td { background: #fff8f7 !important; }
    .pname { font-weight: 600; color: #111; white-space: nowrap; display: flex; align-items: center; gap: 4px; }
    .kalpi-row .pname { color: var(--accent); font-weight: 700; }
    .r { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: 600; white-space: nowrap; }
    .r.high { background: #dcfce7; color: #15803d; }
    .r.med  { background: #fef9c3; color: #854d0e; }
    .r.low  { background: #fee2e2; color: #991b1b; }
    .r.none { background: #f3f4f6; color: #9ca3af; }
    .usp-tip {
      display: inline-flex; align-items: center; justify-content: center;
      width: 15px; height: 15px; border-radius: 50%;
      background: #eee; color: #888;
      font-size: 8px; font-weight: 700; font-style: normal;
      cursor: help; position: relative; flex-shrink: 0;
    }
    .kalpi-row .usp-tip { background: var(--accent); color: white; }
    .usp-tip::after {
      content: attr(data-usp);
      position: absolute; bottom: calc(100% + 6px); left: 0;
      background: #111; color: #fff;
      padding: 7px 12px; border-radius: 5px;
      font-size: 11px; font-weight: 400;
      white-space: normal; width: 230px; line-height: 1.5;
      z-index: 100; pointer-events: none; opacity: 0; transition: opacity 0.15s;
    }
    .usp-tip:hover::after { opacity: 1; }

    /* ── Framework pipeline ── */
    .fw-pipeline { display:flex; align-items:stretch; border:1px solid var(--border); border-radius:6px; overflow:hidden; margin:4px 0 36px; }
    .fw-node { flex:1; padding:16px 14px; background:#fafafa; border-right:1px solid var(--border); min-width:108px; }
    .fw-node:last-child { border-right:none; }
    .fw-node-step { font-size:9px; font-weight:800; letter-spacing:0.12em; color:var(--accent); text-transform:uppercase; margin-bottom:3px; }
    .fw-node-title { font-size:14px; font-weight:700; color:#111; margin-bottom:5px; }
    .fw-node-sub { font-size:10.5px; color:#777; line-height:1.45; margin-bottom:8px; padding-bottom:8px; border-bottom:1px solid var(--border); }
    .fw-node-badges { display:flex; gap:4px; flex-wrap:wrap; }

    /* ── Gate matrix ── */
    .gate-table { width:100%; border-collapse:collapse; font-size:12px; margin:16px 0 8px; }
    .gate-table th { padding:8px 12px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:#888; background:#f9f9f9; border-bottom:2px solid var(--border); text-align:left; }
    .gate-table th:not(:first-child) { text-align:center; }
    .gate-table td { padding:9px 12px; border-bottom:1px solid #f5f5f5; vertical-align:middle; }
    .gate-table td:not(:first-child) { text-align:center; }
    .gate-name { font-weight:600; color:#222; font-size:12px; display:block; }
    .gate-bgs { margin-top:4px; display:flex; gap:3px; flex-wrap:wrap; }
    .gc { display:inline-block; padding:2px 9px; border-radius:3px; font-size:10.5px; font-weight:500; white-space:nowrap; }
    .gc.yes { background:#dcfce7; color:#15803d; }
    .gc.mod { background:#fef9c3; color:#854d0e; }
    .gc.na  { background:#f3f4f6; color:#ccc; }
    .gc.reg { background:#fff7ed; color:#c2410c; border:1px solid #fcd8b0; }

    /* ── Ranking example ── */
    .rank-table { width:100%; border-collapse:collapse; font-size:11.5px; margin:16px 0 4px; }
    .rank-table th { padding:7px 10px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:#888; background:#f9f9f9; border-bottom:2px solid var(--border); text-align:center; white-space:nowrap; }
    .rank-table th:first-child { text-align:left; }
    .rank-table td { padding:8px 10px; border-bottom:1px solid #f5f5f5; text-align:center; color:#555; }
    .rank-table td:first-child { text-align:left; font-weight:600; color:#111; }
    .raw  { color:#bbb; font-size:10.5px; }
    .arr  { color:#ddd; margin:0 2px; }
    .pct  { font-weight:700; color:#15803d; }
    .score-cell { font-weight:800; font-size:14px; color:#111; }
    .rank-cell  { color:var(--accent); font-weight:700; }
    .tbl-note { font-size:11px; color:#777; margin-bottom:6px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; line-height:1.6; }
    .chart-note { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:8px; font-size:11px; color:#666; align-items:center; }

    /* ── CSS Bar Chart ── */
    .css-chart { margin: 12px 0 16px; }
    .css-chart-body { display: flex; }
    .css-y-axis {
      display: flex; flex-direction: column; justify-content: space-between;
      padding: 0 8px 24px 0; font-size: 9px; color: #bbb; text-align: right;
      width: 32px; flex-shrink: 0;
    }
    .css-chart-area {
      flex: 1; position: relative; height: 200px;
      border-left: 1px solid #e5e5e5; border-bottom: 1px solid #e5e5e5;
    }
    .css-gridlines {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; justify-content: space-between;
      pointer-events: none;
    }
    .css-gridlines div { border-top: 1px dashed #f0f0f0; }
    .css-gridlines div:first-child { border-top: none; }
    .css-bar-groups {
      position: absolute; inset: 0;
      display: flex; align-items: flex-end; justify-content: space-around; padding: 0 8px;
    }
    .css-bar-group { display: flex; flex-direction: column; align-items: center; }
    .css-bars { display: flex; gap: 2px; align-items: flex-end; }
    .css-bar { width: 13px; border-radius: 2px 2px 0 0; transition: opacity 0.15s; flex-shrink: 0; }
    .css-bar:hover { opacity: 0.7; }
    .b-eq  { background: #6366f1; }
    .b-lin { background: #c0392b; }
    .b-sfx { background: #ea580c; }
    .b-rsk { background: #15803d; }
    .css-bar-glabel { font-size: 10px; color: #666; text-align: center; margin-top: 5px; line-height: 1.3; }
    .css-bar-glabel small { font-size: 8.5px; color: #bbb; }
    .css-legend { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 8px; font-size: 11px; color: #555; }
    .css-legend span { display: flex; align-items: center; gap: 5px; }
    .css-ld { display: inline-block; width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    /* ── Corner Cases Toggle ── */
    .cc-container{margin:20px 0 36px}
    .cc-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)}
    .cc-tab{padding:5px 12px;border:1px solid #ddd;border-radius:20px;font-size:11px;cursor:pointer;background:white;color:#888;font-family:inherit;transition:all .12s}
    .cc-tab:hover{color:#333;border-color:#999}
    .cc-tab.active{background:#111;color:white;border-color:#111}
    .cc-panel{display:none}
    .cc-panel.active{display:block}
    .cc-card{border:1px solid var(--border);border-radius:8px;overflow:hidden}
    .cc-card-header{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#f9f9f9;border-bottom:1px solid var(--border)}
    .cc-cat{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border-radius:3px}
    .cc-cat.conc{background:#fff7ed;color:#c2410c;border:1px solid #fcd8b0}
    .cc-cat.data{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
    .cc-cat.reg{background:#fff1f2;color:#be123c;border:1px solid #fecdd3}
    .cc-title{font-size:14px;font-weight:700;color:#111;flex:1}
    .cc-impact{font-size:9px;font-weight:700;padding:2px 8px;border-radius:3px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
    .cc-impact.high{background:#fee2e2;color:#991b1b}
    .cc-impact.med{background:#fef9c3;color:#854d0e}
    .cc-impact.low{background:#f3f4f6;color:#6b7280}
    .cc-rows{border-bottom:1px solid var(--border)}
    .cc-row{display:flex;border-bottom:1px solid #f5f5f5}
    .cc-row:last-child{border-bottom:none}
    .cc-row-label{width:82px;flex-shrink:0;padding:13px 12px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#bbb;background:#fafafa;border-right:1px solid #f5f5f5}
    .cc-row-body{padding:11px 14px;color:#444;flex:1;font-size:13px;line-height:1.65}
    .cc-row-body ul{margin:4px 0 0 16px}
    .cc-row-body li{margin-bottom:5px;font-size:12.5px;color:#444}
    .cc-row-body strong{color:#111}
    .cc-viz{padding:14px 16px;background:#fafafa;border-top:1px solid var(--border)}
    .cc-viz-title{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#bbb;margin-bottom:10px}
    /* overlap matrix */
    .ov-matrix{border-collapse:collapse;font-size:11px}
    .ov-matrix th{padding:5px 10px;font-weight:600;color:#888;font-size:10px;text-align:center}
    .ov-matrix th:first-child{text-align:left}
    .ov-matrix td{padding:6px 10px;text-align:center;border:1px solid #eee;font-weight:600;font-size:11px;min-width:46px}
    .ov-matrix td:first-child{text-align:left;background:none!important;font-weight:700;color:#333;border:none}
    .ov-high{background:#fee2e2;color:#991b1b}
    .ov-med{background:#fef9c3;color:#854d0e}
    .ov-low{background:#dcfce7;color:#15803d}
    .ov-na{background:#f9f9f9;color:#ddd}
    /* amc bars */
    .amc-bars{display:flex;flex-direction:column;gap:8px}
    .amc-row{display:flex;align-items:center;gap:10px}
    .amc-label{width:90px;flex-shrink:0;color:#666;text-align:right;font-size:11px}
    .amc-bar-wrap{flex:1;background:#f0f0f0;border-radius:3px;height:20px;overflow:hidden}
    .amc-bar-fill{height:100%;border-radius:3px;display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:700;color:white;white-space:nowrap}
    .amc-flag{font-size:9px;background:#fee2e2;color:#991b1b;padding:1px 6px;border-radius:3px;flex-shrink:0;white-space:nowrap}
    /* universe strip */
    .universe-strip{display:flex;height:28px;border-radius:4px;overflow:hidden;margin-bottom:8px}
    .us-block{display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:700;color:white}
    .us-legend{display:flex;gap:12px;flex-wrap:wrap;font-size:10.5px;color:#666}
    .us-legend span{display:flex;align-items:center;gap:4px}
    .us-dot{width:10px;height:10px;border-radius:2px;display:inline-block;flex-shrink:0}
    /* coverage & data grids */
    .cov-matrix,.data-grid{border-collapse:collapse;font-size:10.5px;width:100%}
    .cov-matrix th,.data-grid th{padding:5px 8px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#aaa;text-align:center;border-bottom:1.5px solid #e5e5e5;white-space:nowrap}
    .cov-matrix th:first-child,.data-grid th:first-child{text-align:left}
    .cov-matrix td,.data-grid td{padding:6px 8px;text-align:center;border-bottom:1px solid #f5f5f5}
    .cov-matrix td:first-child,.data-grid td:first-child{text-align:left;font-weight:600;color:#555;font-size:11px}
    .cov-y,.dg-ok{background:#dcfce7;color:#15803d;border-radius:3px;font-size:9.5px;font-weight:700;padding:1px 5px;display:inline-block}
    .cov-p,.dg-stale{background:#fef9c3;color:#854d0e;border-radius:3px;font-size:9.5px;font-weight:700;padding:1px 5px;display:inline-block}
    .cov-n,.dg-miss{background:#fee2e2;color:#991b1b;border-radius:3px;font-size:9.5px;font-weight:700;padding:1px 5px;display:inline-block}
    .cov-na,.dg-na{color:#ddd}
    /* exit load timeline */
    .el-timeline{display:flex;flex-direction:column;gap:9px}
    .el-row{display:flex;align-items:center;gap:10px}
    .el-fund{width:140px;flex-shrink:0;font-size:11px;color:#555;text-align:right;line-height:1.3}
    .el-track{flex:1;height:20px;background:#f0f0f0;border-radius:3px;overflow:hidden;display:flex}
    .el-load{height:100%;display:flex;align-items:center;padding-left:8px;font-size:9.5px;font-weight:700;color:white;white-space:nowrap}
    .el-rate{width:36px;flex-shrink:0;font-size:10px;color:#888;text-align:right}
    /* merger timeline */
    .mt-strip{display:flex;align-items:stretch;gap:0}
    .mt-box{flex:1;padding:10px 12px;border-radius:5px;font-size:11px;line-height:1.4}
    .mt-arrow{font-size:18px;color:#ddd;padding:0 6px;flex-shrink:0;display:flex;align-items:center}
    .mt-before{background:#eff6ff;border:1.5px solid #bfdbfe}
    .mt-event{background:#fff7ed;border:1.5px solid #fcd8b0;text-align:center}
    .mt-after{background:#f0fdf4;border:1.5px solid #bbf7d0}

    /* ── Section 4: Execution Visualizations ── */
    .nav-bar-wrap{display:flex;height:26px;border-radius:4px;overflow:hidden;margin-bottom:4px}
    .nav-zone{height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;white-space:nowrap;padding:0 6px}
    .nav-settle-grid{border-collapse:collapse;font-size:11px;width:100%}
    .nav-settle-grid th{padding:5px 10px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#aaa;background:#f9f9f9;border-bottom:1.5px solid #e5e5e5;text-align:center}
    .nav-settle-grid th:first-child{text-align:left}
    .nav-settle-grid td{padding:7px 10px;border-bottom:1px solid #f5f5f5;text-align:center}
    .nav-settle-grid td:first-child{text-align:left;font-weight:600;color:#333}
    .t0{background:#dcfce7;color:#15803d;border-radius:3px;padding:2px 7px;font-size:10px;font-weight:700}
    .t1{background:#fef9c3;color:#854d0e;border-radius:3px;padding:2px 7px;font-size:10px;font-weight:700}
    .t2{background:#fee2e2;color:#991b1b;border-radius:3px;padding:2px 7px;font-size:10px;font-weight:700}
    .rb-flow{display:flex;flex-direction:column}

    /* Responsive */
    @media (max-width: 860px) {
      #sidebar { display: none; }
      #main { margin-left: 0; padding: 28px 24px 64px; }
    }
  </style>
</head>
<body>

<nav id="sidebar">
  <div id="sidebar-header">
    <div class="brand">Kalpi</div>
    <div class="sub">Research &amp; Product Thinking</div>
  </div>
  <ul id="sidebar-nav"></ul>
</nav>

<main id="main">
  <div id="badge-legend">
    <span><span class="badge reg">Regulatory</span> SEBI / legal mandate</span>
    <span><span class="badge assume">Assumption</span> Design heuristic / threshold choice</span>
    <span><span class="badge impl">Prototype</span> Built in this prototype</span>
  </div>
  {{ content }}
</main>

<script>
  const nav = document.getElementById('sidebar-nav');
  const headings = Array.from(document.querySelectorAll('#main h2, #main h3'));

  headings.forEach(h => {
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.href = '#' + h.id;
    // strip leading "1. " numbering from display text
    a.textContent = h.textContent.replace(/^\d+\.\s+/, '');
    a.className = h.tagName === 'H2' ? 'h2' : 'h3';
    li.appendChild(a);
    nav.appendChild(li);
  });

  // Highlight active section on scroll
  const links = Array.from(nav.querySelectorAll('a'));

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        links.forEach(l => l.classList.remove('active'));
        const active = nav.querySelector('a[href="#' + entry.target.id + '"]');
        if (active) {
          active.classList.add('active');
          // scroll sidebar to keep active link visible
          active.scrollIntoView({ block: 'nearest' });
        }
      }
    });
  }, { rootMargin: '-10% 0px -80% 0px', threshold: 0 });

  headings.forEach(h => observer.observe(h));

  // ── Competitor filter chips ──
  document.querySelectorAll('.comp-filters input[type=checkbox]').forEach(function(cb) {
    cb.addEventListener('change', function() {
      var row = document.querySelector('tr[data-row="' + this.dataset.row + '"]');
      if (row) row.style.display = this.checked ? '' : 'none';
      this.closest('.chip').classList.toggle('active', this.checked);
    });
  });

  // ── Corner cases tab toggle (scoped to parent container) ──
  document.querySelectorAll('.cc-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      var container = this.closest('.cc-container');
      container.querySelectorAll('.cc-tab').forEach(function(t) { t.classList.remove('active'); });
      container.querySelectorAll('.cc-panel').forEach(function(p) { p.classList.remove('active'); });
      this.classList.add('active');
      var panel = document.getElementById('cc-' + this.dataset.case);
      if (panel) panel.classList.add('active');
    });
  });

</script>

</body>
</html>
