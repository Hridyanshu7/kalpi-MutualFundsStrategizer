<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-card: #f9f9f9;
      --border: #e5e5e5;
      --text: #1a1a1a;
      --muted: #888;
      --accent: #c0392b;
      --sidebar-w: 256px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-w);
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 24px 20px 18px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #sidebar-header .brand {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #sidebar-header .sub {
      font-size: 11px;
      color: #aaa;
      margin-top: 3px;
    }

    #sidebar-nav {
      overflow-y: auto;
      flex: 1;
      padding: 12px 0 24px;
      list-style: none;
    }

    #sidebar-nav::-webkit-scrollbar { width: 4px; }
    #sidebar-nav::-webkit-scrollbar-track { background: transparent; }
    #sidebar-nav::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

    #sidebar-nav li a {
      display: block;
      padding: 5px 20px;
      font-size: 12px;
      color: #888;
      text-decoration: none;
      line-height: 1.45;
      transition: color 0.12s, background 0.12s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #sidebar-nav li a.h2 {
      font-weight: 600;
      color: #444;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    #sidebar-nav li:first-child a.h2 {
      margin-top: 0;
      border-top: none;
    }

    #sidebar-nav li a.h3 {
      padding-left: 32px;
      font-size: 11px;
    }

    #sidebar-nav li a:hover { color: #1a1a1a; }

    #sidebar-nav li a.active {
      color: var(--accent);
      background: rgba(192, 57, 43, 0.07);
    }

    /* ── Main content ── */
    #main {
      margin-left: var(--sidebar-w);
      flex: 1;
      max-width: 820px;
      padding: 52px 52px 96px;
      min-width: 0;
    }

    /* Typography */
    #main h1 {
      font-size: 24px;
      font-weight: 700;
      color: #111;
      line-height: 1.3;
      margin-bottom: 6px;
    }

    #main > p:first-of-type {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 32px;
    }

    #main h2 {
      font-size: 17px;
      font-weight: 600;
      color: #111;
      margin: 48px 0 18px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    #main h3 {
      font-size: 14px;
      font-weight: 600;
      color: #222;
      margin: 32px 0 10px;
    }

    #main h4 {
      font-size: 12px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 20px 0 8px;
    }

    #main p {
      font-size: 13.5px;
      line-height: 1.75;
      color: #333;
      margin-bottom: 12px;
    }

    #main ul, #main ol {
      padding-left: 20px;
      margin-bottom: 14px;
    }

    #main li {
      font-size: 13px;
      line-height: 1.7;
      color: #444;
      margin-bottom: 5px;
    }

    #main li strong { color: #111; }

    #main strong { color: #111; font-weight: 600; }

    #main em { color: #666; font-style: italic; }

    #main a { color: var(--accent); text-decoration: none; }
    #main a:hover { text-decoration: underline; }

    #main hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 36px 0;
    }

    #main table {
      width: 100%;
      border-collapse: collapse;
      margin: 18px 0;
      font-size: 12px;
    }

    #main thead tr {
      border-bottom: 1px solid var(--border);
    }

    #main th {
      text-align: left;
      padding: 8px 14px;
      color: #888;
      font-weight: 500;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    #main td {
      padding: 8px 14px;
      color: #444;
      border-bottom: 1px solid #eee;
    }

    #main tbody tr:hover td { background: #fafafa; }

    #main td strong { color: #111; }

    #main code {
      font-family: 'SF Mono', 'Fira Code', 'Monaco', monospace;
      font-size: 11.5px;
      background: #f4f4f4;
      padding: 2px 6px;
      border-radius: 3px;
      color: #c0392b;
    }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      font-size: 9.5px;
      font-weight: 700;
      padding: 1px 7px;
      border-radius: 3px;
      vertical-align: middle;
      margin: 0 4px 0 2px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      line-height: 18px;
      white-space: nowrap;
    }
    .badge.reg    { background: #fff7ed; color: #c2410c; border: 1px solid #fcd8b0; }
    .badge.assume { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
    .badge.impl   { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }

    /* Legend */
    #badge-legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 28px;
      padding: 12px 16px;
      background: #fafafa;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      font-size: 11px;
      color: #666;
    }
    #badge-legend span { display: flex; align-items: center; gap: 6px; }

    /* ── Comparison matrix ── */
    .comp-matrix { margin: 20px 0 12px; }
    .comp-filters {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: flex-start;
      padding: 12px 0;
      margin-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .filter-group { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .fg-label {
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #bbb;
      min-width: 38px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border: 1px solid #ddd;
      border-radius: 20px;
      font-size: 11px;
      cursor: pointer;
      color: #999;
      background: white;
      user-select: none;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    .chip input[type=checkbox] { display: none; }
    .chip.active { background: #111; color: white; border-color: #111; }
    .comp-table-scroll { overflow-x: auto; }
    .comp-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      min-width: 560px;
    }
    .comp-table thead th {
      background: #f9f9f9;
      padding: 8px 12px;
      text-align: left;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
    }
    .comp-table tbody td {
      padding: 9px 12px;
      border-bottom: 1px solid #f5f5f5;
      vertical-align: middle;
    }
    .comp-table tbody tr:hover td { background: #fafafa; }
    .kalpi-row td { background: #fff8f7 !important; }
    .pname { font-weight: 600; color: #111; white-space: nowrap; display: flex; align-items: center; gap: 4px; }
    .kalpi-row .pname { color: var(--accent); font-weight: 700; }
    .r { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: 600; white-space: nowrap; }
    .r.high { background: #dcfce7; color: #15803d; }
    .r.med  { background: #fef9c3; color: #854d0e; }
    .r.low  { background: #fee2e2; color: #991b1b; }
    .r.none { background: #f3f4f6; color: #9ca3af; }
    .usp-tip {
      display: inline-flex; align-items: center; justify-content: center;
      width: 15px; height: 15px; border-radius: 50%;
      background: #eee; color: #888;
      font-size: 8px; font-weight: 700; font-style: normal;
      cursor: help; position: relative; flex-shrink: 0;
    }
    .kalpi-row .usp-tip { background: var(--accent); color: white; }
    .usp-tip::after {
      content: attr(data-usp);
      position: absolute; bottom: calc(100% + 6px); left: 0;
      background: #111; color: #fff;
      padding: 7px 12px; border-radius: 5px;
      font-size: 11px; font-weight: 400;
      white-space: normal; width: 230px; line-height: 1.5;
      z-index: 100; pointer-events: none; opacity: 0; transition: opacity 0.15s;
    }
    .usp-tip:hover::after { opacity: 1; }

    /* ── Framework pipeline ── */
    .fw-pipeline { display:flex; align-items:stretch; border:1px solid var(--border); border-radius:6px; overflow:hidden; margin:4px 0 36px; }
    .fw-node { flex:1; padding:16px 14px; background:#fafafa; border-right:1px solid var(--border); min-width:108px; }
    .fw-node:last-child { border-right:none; }
    .fw-node-step { font-size:9px; font-weight:800; letter-spacing:0.12em; color:var(--accent); text-transform:uppercase; margin-bottom:3px; }
    .fw-node-title { font-size:14px; font-weight:700; color:#111; margin-bottom:5px; }
    .fw-node-sub { font-size:10.5px; color:#777; line-height:1.45; margin-bottom:8px; padding-bottom:8px; border-bottom:1px solid var(--border); }
    .fw-node-badges { display:flex; gap:4px; flex-wrap:wrap; }

    /* ── Gate matrix ── */
    .gate-table { width:100%; border-collapse:collapse; font-size:12px; margin:16px 0 8px; }
    .gate-table th { padding:8px 12px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:#888; background:#f9f9f9; border-bottom:2px solid var(--border); text-align:left; }
    .gate-table th:not(:first-child) { text-align:center; }
    .gate-table td { padding:9px 12px; border-bottom:1px solid #f5f5f5; vertical-align:middle; }
    .gate-table td:not(:first-child) { text-align:center; }
    .gate-name { font-weight:600; color:#222; font-size:12px; display:block; }
    .gate-bgs { margin-top:4px; display:flex; gap:3px; flex-wrap:wrap; }
    .gc { display:inline-block; padding:2px 9px; border-radius:3px; font-size:10.5px; font-weight:500; white-space:nowrap; }
    .gc.yes { background:#dcfce7; color:#15803d; }
    .gc.mod { background:#fef9c3; color:#854d0e; }
    .gc.na  { background:#f3f4f6; color:#ccc; }
    .gc.reg { background:#fff7ed; color:#c2410c; border:1px solid #fcd8b0; }

    /* ── Ranking example ── */
    .rank-table { width:100%; border-collapse:collapse; font-size:11.5px; margin:16px 0 4px; }
    .rank-table th { padding:7px 10px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:#888; background:#f9f9f9; border-bottom:2px solid var(--border); text-align:center; white-space:nowrap; }
    .rank-table th:first-child { text-align:left; }
    .rank-table td { padding:8px 10px; border-bottom:1px solid #f5f5f5; text-align:center; color:#555; }
    .rank-table td:first-child { text-align:left; font-weight:600; color:#111; }
    .raw  { color:#bbb; font-size:10.5px; }
    .arr  { color:#ddd; margin:0 2px; }
    .pct  { font-weight:700; color:#15803d; }
    .score-cell { font-weight:800; font-size:14px; color:#111; }
    .rank-cell  { color:var(--accent); font-weight:700; }
    .tbl-note { font-size:11px; color:#777; margin-bottom:6px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; line-height:1.6; }
    .chart-note { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:8px; font-size:11px; color:#666; align-items:center; }

    /* Responsive */
    @media (max-width: 860px) {
      #sidebar { display: none; }
      #main { margin-left: 0; padding: 28px 24px 64px; }
    }
  </style>
</head>
<body>

<nav id="sidebar">
  <div id="sidebar-header">
    <div class="brand">Kalpi</div>
    <div class="sub">Research &amp; Product Thinking</div>
  </div>
  <ul id="sidebar-nav"></ul>
</nav>

<main id="main">
  <div id="badge-legend">
    <span><span class="badge reg">Regulatory</span> SEBI / legal mandate</span>
    <span><span class="badge assume">Assumption</span> Design heuristic / threshold choice</span>
    <span><span class="badge impl">Prototype</span> Built in this prototype</span>
  </div>
  {{ content }}
</main>

<script>
  const nav = document.getElementById('sidebar-nav');
  const headings = Array.from(document.querySelectorAll('#main h2, #main h3'));

  headings.forEach(h => {
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.href = '#' + h.id;
    // strip leading "1. " numbering from display text
    a.textContent = h.textContent.replace(/^\d+\.\s+/, '');
    a.className = h.tagName === 'H2' ? 'h2' : 'h3';
    li.appendChild(a);
    nav.appendChild(li);
  });

  // Highlight active section on scroll
  const links = Array.from(nav.querySelectorAll('a'));

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        links.forEach(l => l.classList.remove('active'));
        const active = nav.querySelector('a[href="#' + entry.target.id + '"]');
        if (active) {
          active.classList.add('active');
          // scroll sidebar to keep active link visible
          active.scrollIntoView({ block: 'nearest' });
        }
      }
    });
  }, { rootMargin: '-10% 0px -80% 0px', threshold: 0 });

  headings.forEach(h => observer.observe(h));

  // ── Competitor filter chips ──
  document.querySelectorAll('.comp-filters input[type=checkbox]').forEach(function(cb) {
    cb.addEventListener('change', function() {
      var row = document.querySelector('tr[data-row="' + this.dataset.row + '"]');
      if (row) row.style.display = this.checked ? '' : 'none';
      this.closest('.chip').classList.toggle('active', this.checked);
    });
  });

  // ── Charts (only if Chart.js loaded) ──
  if (typeof Chart === 'undefined') return;

  // Section 1 — competitive positioning scatter
  var compCanvas = document.getElementById('comp-chart');
  if (compCanvas) {
    var labelPlugin = {
      id: 'dataLabels',
      afterDatasetsDraw: function(chart) {
        var ctx = chart.ctx; ctx.save();
        chart.data.datasets.forEach(function(ds, i) {
          chart.getDatasetMeta(i).data.forEach(function(pt, j) {
            var d = ds.data[j]; if (!d.label) return;
            var k = d.label === 'Kalpi';
            ctx.font = (k ? 'bold ' : '') + '10px -apple-system,sans-serif';
            ctx.fillStyle = k ? '#c0392b' : '#444';
            ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
            ctx.fillText(d.label, pt.x, pt.y - (k ? 15 : 11));
          });
        });
        ctx.restore();
      }
    };
    new Chart(compCanvas.getContext('2d'), {
      type: 'scatter',
      data: {
        datasets: [
          { label: 'No Strategy Builder',
            data: [{x:2,y:4.5,label:'ET Money'},{x:1,y:4.5,label:'Groww'},{x:1.5,y:4,label:'INDmoney'},{x:3,y:3.5,label:'Kuvera'},{x:1.5,y:3.8,label:'Coin'},{x:4.5,y:1,label:'Value Research'},{x:5,y:0.5,label:'Morningstar'}],
            backgroundColor:'rgba(150,150,150,0.55)', borderColor:'rgba(100,100,100,0.7)', pointRadius:9, borderWidth:1.5 },
          { label: 'Partial / Opaque Builder',
            data: [{x:3.5,y:4.5,label:'Wealthfront'},{x:2.5,y:4,label:'Betterment'},{x:2,y:3.5,label:'M1 Finance'}],
            backgroundColor:'rgba(234,179,8,0.6)', borderColor:'rgba(202,138,4,0.8)', pointRadius:9, borderWidth:1.5 },
          { label: 'Kalpi — Transparent Builder',
            data: [{x:4,y:4.5,label:'Kalpi'}],
            backgroundColor:'rgba(192,57,43,0.85)', borderColor:'#c0392b', pointRadius:13, borderWidth:2 }
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins: {
          legend:{ position:'bottom', labels:{ font:{size:11}, color:'#666', boxWidth:12, padding:16 } },
          tooltip:{ callbacks:{ label:function(c){ return ' '+c.raw.label+' (Research: '+c.raw.x+' / Execution: '+c.raw.y+')'; } } }
        },
        scales: {
          x:{ title:{display:true,text:'Research & Analytics Depth →',color:'#888',font:{size:11}}, min:0, max:5.5, ticks:{color:'#bbb',font:{size:10},stepSize:1}, grid:{color:'#f0f0f0'} },
          y:{ title:{display:true,text:'Execution Capability →',color:'#888',font:{size:11}}, min:0, max:5.5, ticks:{color:'#bbb',font:{size:10},stepSize:1}, grid:{color:'#f0f0f0'} }
        }
      },
      plugins: [labelPlugin]
    });
  }

  // Section 2 — weighting comparison bar chart
  var wtCanvas = document.getElementById('wt-chart');
  if (wtCanvas) {
    new Chart(wtCanvas.getContext('2d'), {
      type: 'bar',
      data: {
        labels: ['Fund A', 'Fund B', 'Fund C', 'Fund D', 'Fund E'],
        datasets: [
          { label:'Equal',           data:[20,20,20,20,20],           backgroundColor:'rgba(99,102,241,0.72)', borderRadius:3 },
          { label:'Score — Linear',  data:[32.2,27.1,20.3,13.6,6.8], backgroundColor:'rgba(192,57,43,0.72)',  borderRadius:3 },
          { label:'Score — Softmax', data:[27.7,23.8,19.5,16.0,13.1],backgroundColor:'rgba(234,88,12,0.72)',  borderRadius:3 },
          { label:'Risk-Based',      data:[11.2,14.4,18.3,22.4,33.6],backgroundColor:'rgba(21,128,61,0.72)',  borderRadius:3 }
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins: {
          legend:{ position:'bottom', labels:{ font:{size:11}, color:'#555', padding:16, boxWidth:12 } },
          tooltip:{ callbacks:{ label:function(c){ return ' '+c.dataset.label+': '+c.raw+'%'; } } }
        },
        scales: {
          x:{ ticks:{color:'#888',font:{size:11}}, grid:{color:'#f5f5f5'} },
          y:{ title:{display:true,text:'Allocation (%)',color:'#aaa',font:{size:11}},
              ticks:{color:'#aaa',font:{size:10},callback:function(v){return v+'%';}},
              grid:{color:'#f5f5f5'}, max:40 }
        }
      }
    });
  }
</script>

</body>
</html>
